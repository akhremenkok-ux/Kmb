<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>КМБ — Система управления Google Sheets</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .container {
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #e94560;
        }
        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            color: #b0b0b0;
        }
        .links a {
            color: #0f3460;
            background: #e94560;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            margin: 0.5rem;
            display: inline-block;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .links a:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <div class="container">
        <h1>КМБ</h1>
        <p>Система автоматизации Google Sheets: управление формами, защита от гриферства и архивация данных.</p>
        <div class="links">
            <a href="privacy.html">Политика конфиденциальности</a>
            <a href="terms.html">Условия использования</a>
        </div>
    </div>
</body>
</html>
